name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lines:check
      - run: pnpm i18n:check
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - name: Validate Compose configuration
        run: |
          cp .env.example .env
          docker compose config --quiet

  api-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: API integration (throwaway Postgres + migrations)
        run: make docker-api-integration
