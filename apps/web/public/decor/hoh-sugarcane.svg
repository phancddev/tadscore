<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 140" preserveAspectRatio="xMidYMax meet" aria-hidden="true">
  <!--
    Decorative sugarcane clusters for HOH mountain band.
    Tall segmented stalks + arching leaves; green/gold palette matches theme.
  -->
  <g fill="#2F6B4F" fill-opacity="0.72" stroke="#1A2E28" stroke-opacity="0.18" stroke-width="0.6">
    <!-- Cluster left -->
    <g transform="translate(28 18)">
      <!-- stalks -->
      <path d="M18 118 V42" stroke="#2A4035" stroke-width="2.2" fill="none" stroke-linecap="round" />
      <path d="M28 118 V36" stroke="#2A4035" stroke-width="2.4" fill="none" stroke-linecap="round" />
      <path d="M38 118 V48" stroke="#2A4035" stroke-width="2" fill="none" stroke-linecap="round" />
      <path d="M48 118 V40" stroke="#2A4035" stroke-width="2.2" fill="none" stroke-linecap="round" />
      <!-- leaf blades -->
      <path d="M28 40 C12 28, 4 18, 6 8 C18 14, 24 24, 28 36 Z" />
      <path d="M28 38 C40 24, 52 14, 58 6 C48 16, 36 26, 28 36 Z" />
      <path d="M18 46 C6 36, -2 24, 0 14 C10 22, 16 32, 18 44 Z" />
      <path d="M38 50 C50 38, 62 28, 68 18 C58 28, 46 40, 38 48 Z" />
      <path d="M48 44 C58 30, 70 18, 78 10 C68 20, 56 32, 48 42 Z" />
      <!-- nodes (mía segments) -->
      <circle cx="28" cy="58" r="1.4" fill="#C4A35A" fill-opacity="0.55" stroke="none" />
      <circle cx="28" cy="78" r="1.4" fill="#C4A35A" fill-opacity="0.45" stroke="none" />
      <circle cx="28" cy="98" r="1.4" fill="#C4A35A" fill-opacity="0.4" stroke="none" />
      <circle cx="18" cy="72" r="1.2" fill="#C4A35A" fill-opacity="0.4" stroke="none" />
      <circle cx="38" cy="80" r="1.2" fill="#C4A35A" fill-opacity="0.4" stroke="none" />
    </g>

    <!-- Cluster mid -->
    <g transform="translate(118 8)">
      <path d="M22 128 V48" stroke="#2A4035" stroke-width="2.3" fill="none" stroke-linecap="round" />
      <path d="M34 128 V38" stroke="#2A4035" stroke-width="2.6" fill="none" stroke-linecap="round" />
      <path d="M46 128 V52" stroke="#2A4035" stroke-width="2.1" fill="none" stroke-linecap="round" />
      <path d="M56 128 V44" stroke="#2A4035" stroke-width="2.3" fill="none" stroke-linecap="round" />
      <path d="M34 40 C16 26, 4 14, 6 2 C22 10, 30 24, 34 38 Z" />
      <path d="M34 38 C50 22, 66 10, 74 0 C62 12, 46 26, 34 36 Z" />
      <path d="M22 52 C8 40, -4 26, -2 14 C10 24, 18 38, 22 50 Z" />
      <path d="M46 54 C60 40, 74 26, 82 16 C70 28, 56 42, 46 52 Z" />
      <path d="M56 48 C70 32, 84 18, 94 8 C82 20, 66 34, 56 46 Z" />
      <circle cx="34" cy="62" r="1.5" fill="#C4A35A" fill-opacity="0.55" stroke="none" />
      <circle cx="34" cy="84" r="1.5" fill="#C4A35A" fill-opacity="0.45" stroke="none" />
      <circle cx="34" cy="106" r="1.5" fill="#C4A35A" fill-opacity="0.4" stroke="none" />
      <circle cx="22" cy="78" r="1.2" fill="#C4A35A" fill-opacity="0.4" stroke="none" />
      <circle cx="46" cy="86" r="1.2" fill="#C4A35A" fill-opacity="0.4" stroke="none" />
    </g>

    <!-- Cluster right (smaller) -->
    <g transform="translate(230 28)">
      <path d="M16 108 V50" stroke="#2A4035" stroke-width="2" fill="none" stroke-linecap="round" />
      <path d="M26 108 V42" stroke="#2A4035" stroke-width="2.2" fill="none" stroke-linecap="round" />
      <path d="M36 108 V54" stroke="#2A4035" stroke-width="1.9" fill="none" stroke-linecap="round" />
      <path d="M26 44 C12 34, 2 22, 4 12 C14 20, 22 30, 26 42 Z" />
      <path d="M26 42 C38 30, 50 20, 56 12 C48 22, 34 32, 26 40 Z" />
      <path d="M16 54 C6 44, -2 32, 0 22 C8 30, 14 42, 16 52 Z" />
      <path d="M36 56 C48 44, 58 34, 64 24 C54 34, 44 46, 36 54 Z" />
      <circle cx="26" cy="64" r="1.3" fill="#C4A35A" fill-opacity="0.5" stroke="none" />
      <circle cx="26" cy="82" r="1.3" fill="#C4A35A" fill-opacity="0.4" stroke="none" />
      <circle cx="16" cy="74" r="1.1" fill="#C4A35A" fill-opacity="0.35" stroke="none" />
    </g>
  </g>
</svg>
